<!DOCTYPE html>
<html lang="pt-BR" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazer login - Contas do Google</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="logo">
            <span class="g-blue">G</span>
            <span class="g-red">o</span>
            <span class="g-yellow">o</span>
            <span class="g-blue">g</span>
            <span class="g-green">l</span>
            <span class="g-red">e</span>
        </div>

        <h2>Fazer login</h2>
        <p class="subtitle">Ir para o painel da Escola</p>

        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" required placeholder=" ">
                <label for="email">E-mail ou telefone</label>
            </div>

            <div class="helper-text">
                <a href="#">Esqueceu seu e-mail?</a>
            </div>

            <p class="privacy-notice">
                Não é seu computador? Use uma janela de navegação privada para fazer login. 
                <a href="#">Saiba mais</a>
            </p>

            <div class="form-actions">
                <a href="#" class="btn-text">Criar conta</a>
                <button type="submit" class="btn-primary">Avançar</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
