<!DOCTYPE html>
<html lang="pt-BR" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Imagens - Portal Escola</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <span class="g-blue">G</span>
            <span class="g-red">o</span>
            <span class="g-yellow">o</span>
            <span class="g-blue">g</span>
            <span class="g-green">l</span>
            <span class="g-red">e</span>
            <span class="logo-sub">Escola</span>
        </div>
        <h1>Galeria de Mídia</h1>
        <p class="subtitle">Acesse os recursos visuais da página inicial</p>
    </header>

    <main class="gallery-container">
        <div class="gallery-grid" id="galleryGrid"></div>
    </main>

    <div class="lightbox" id="lightbox">
        <span class="close-lightbox" id="closeLightbox">&times;</span>
        <img class="lightbox-content" id="lightboxImg" src="" alt="Visualização">
    </div>

    <script src="script.js"></script>
</body>
</html>
